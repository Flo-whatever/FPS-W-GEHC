<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>FPS Multijoueur</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }
#canvas { display:block; width:100vw; height:100vh; }
#hud { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }
#crosshair { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:20px; height:20px; }
#crosshair::before,#crosshair::after { content:''; position:absolute; background:rgba(255,255,255,0.9); }
#crosshair::before { width:2px; height:20px; left:9px; top:0; }
#crosshair::after { width:20px; height:2px; top:9px; left:0; }
#ammo { position:absolute; bottom:30px; right:40px; color:#fff; font-size:28px; font-weight:bold; text-shadow:2px 2px 4px #000; }
#ammo span { font-size:16px; opacity:0.7; }
#health-bar { position:absolute; bottom:30px; left:40px; display:flex; gap:8px; }
.heart { width:24px; height:24px; background:#e74c3c; clip-path:polygon(50% 15%,75% 0%,100% 25%,100% 55%,50% 100%,0% 55%,0% 25%,25% 0%); transition:opacity 0.3s; }
.heart.empty { opacity:0.2; }
#reload-bar { position:absolute; bottom:80px; right:40px; width:160px; height:6px; background:rgba(255,255,255,0.2); border-radius:3px; display:none; }
#reload-fill { height:100%; width:0%; background:#f39c12; border-radius:3px; transition:width linear; }
#kill-feed { position:absolute; top:20px; right:20px; display:flex; flex-direction:column; gap:6px; align-items:flex-end; }
.kill-msg { background:rgba(0,0,0,0.6); color:#fff; padding:4px 10px; border-radius:4px; font-size:13px; border-left:3px solid #e74c3c; animation:fadeOut 3s forwards; }
@keyframes fadeOut { 0%{opacity:1} 70%{opacity:1} 100%{opacity:0} }
#hit-flash { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(255,0,0,0); pointer-events:none; transition:background 0.05s; }
#death-screen { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.75); display:none; flex-direction:column; align-items:center; justify-content:center; color:#e74c3c; font-size:48px; font-weight:bold; }
#death-screen p { font-size:20px; color:#fff; margin-top:10px; }
#connect-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:#0a0a0a; z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff; }
#connect-screen h1 { font-size:52px; margin-bottom:8px; letter-spacing:4px; color:#f39c12; }
#connect-screen p { color:#888; margin-bottom:40px; font-size:14px; }
#connect-screen input { background:#1a1a1a; border:1px solid #444; color:#fff; padding:12px 20px; font-size:18px; border-radius:6px; width:380px; text-align:center; margin-bottom:16px; font-family:'Courier New',monospace; outline:none; }
#connect-screen input:focus { border-color:#f39c12; }
#connect-btn { background:#f39c12; color:#000; border:none; padding:12px 40px; font-size:18px; font-weight:bold; border-radius:6px; cursor:pointer; letter-spacing:2px; transition:background 0.2s; }
#connect-btn:hover { background:#e67e22; }
.hint { color:#555; font-size:13px; margin-top:24px; line-height:1.8; text-align:center; }
#muzzle-flash { position:absolute; bottom:120px; right:160px; width:40px; height:40px; background:radial-gradient(circle,#fff 0%,#f39c12 40%,transparent 70%); border-radius:50%; display:none; pointer-events:none; }
#hit-marker { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#e74c3c; font-size:28px; font-weight:bold; display:none; pointer-events:none; text-shadow:1px 1px 3px #000; }
#info { position:absolute; top:20px; left:20px; color:rgba(255,255,255,0.6); font-size:13px; }
#reloading-text { position:absolute; bottom:90px; right:40px; color:#f39c12; font-size:14px; display:none; text-transform:uppercase; letter-spacing:2px; }
</style>
</head>
<body>
<div id="connect-screen">
  <h1>⚔ FPS</h1>
  <p>Jeu de tir multijoueur en réseau local</p>
  <input id="fps-w-gehc-production.up.railway.app" type="text" placeholder="wss://votre-serveur.up.railway.app" value="wss://votre-serveur.up.railway.app"/>
  <button id="connect-btn">REJOINDRE</button>
  <div class="hint">
    Z — Avancer &nbsp;|&nbsp; S — Reculer &nbsp;|&nbsp; Q — Gauche &nbsp;|&nbsp; D — Droite<br>
    Espace — Sauter &nbsp;|&nbsp; Clic gauche — Tirer &nbsp;|&nbsp; R — Recharger<br><br>
    Entrez l'URL Railway de votre serveur WebSocket
  </div>
</div>

<canvas id="canvas"></canvas>

<div id="hud">
  <div id="crosshair"></div>
  <div id="ammo">30 <span>/ ∞</span></div>
  <div id="health-bar">
    <div class="heart" id="h1"></div>
    <div class="heart" id="h2"></div>
    <div class="heart" id="h3"></div>
    <div class="heart" id="h4"></div>
  </div>
  <div id="reload-bar"><div id="reload-fill"></div></div>
  <div id="reloading-text">Rechargement...</div>
  <div id="kill-feed"></div>
  <div id="hit-flash"></div>
  <div id="death-screen"><div>MORT</div><p>Réapparition dans 2s...</p></div>
  <div id="muzzle-flash"></div>
  <div id="hit-marker">✕</div>
  <div id="info">En ligne</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x87CEEB);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x87CEEB, 0.018);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.set(0,1.7,0);

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const sun = new THREE.DirectionalLight(0xfffbe6, 1.0);
sun.position.set(20,40,20);
sun.castShadow = true;
sun.shadow.mapSize.width = 2048; sun.shadow.mapSize.height = 2048;
sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 200;
sun.shadow.camera.left = -60; sun.shadow.camera.right = 60;
sun.shadow.camera.top = 60; sun.shadow.camera.bottom = -60;
scene.add(sun);

// Textures
function makeTexture(color, roughColor, rep) {
  const c = document.createElement('canvas'); c.width=64; c.height=64;
  const ctx = c.getContext('2d');
  ctx.fillStyle = color; ctx.fillRect(0,0,64,64);
  ctx.fillStyle = roughColor;
  for(let i=0;i<200;i++) ctx.fillRect(Math.random()*64,Math.random()*64,Math.random()*3+1,Math.random()*3+1);
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  if(rep) t.repeat.set(rep,rep);
  return t;
}

const floorTex = makeTexture('#5a5a5a','#444444',20);
const wallTex = makeTexture('#8B7355','#7A6245',4);
const ceilTex = makeTexture('#999999','#888888',10);
const wallMat = new THREE.MeshLambertMaterial({map:wallTex});

// Floor
const floor = new THREE.Mesh(new THREE.PlaneGeometry(80,80), new THREE.MeshLambertMaterial({map:floorTex}));
floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; scene.add(floor);

// Ceiling
const ceil = new THREE.Mesh(new THREE.PlaneGeometry(80,80), new THREE.MeshLambertMaterial({map:ceilTex, color:0xbbbbbb}));
ceil.rotation.x = Math.PI/2; ceil.position.y = 5; ceil.receiveShadow = true; scene.add(ceil);

// Walls
const walls = [];
function addWall(x,y,z,w,h,d,color) {
  const mat = color ? new THREE.MeshLambertMaterial({color}) : wallMat.clone();
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
  m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true;
  scene.add(m);
  walls.push({mesh:m, box:new THREE.Box3().setFromObject(m)});
  return m;
}

const B=35;
addWall(0,2.5,-B,70,5,1); addWall(0,2.5,B,70,5,1);
addWall(-B,2.5,0,1,5,70); addWall(B,2.5,0,1,5,70);

// Central pillars
[[-5,5],[-5,-5],[5,5],[5,-5]].forEach(([x,z])=>addWall(x,2.5,z,1,5,1,0x666655));

// North corridor
addWall(0,2.5,-15,6,5,14,null); // corridor walls via side walls
addWall(-3,2.5,-15,0.5,5,14,0x7A5A10); addWall(3,2.5,-15,0.5,5,14,0x7A5A10);
addWall(0,2.5,-18,6,5,1,0x8B6914); addWall(0,2.5,-12,6,5,1,0x8B6914);
addWall(0,2.5,-24,6,5,1,0x8B6914);
addWall(-3,2.5,-21,0.5,5,6,0x7A5A10); addWall(3,2.5,-21,0.5,5,6,0x7A5A10);

// Left wing
addWall(-14,2.5,0,0.5,5,14,0x556644); addWall(-20,2.5,0,0.5,5,14,0x556644);
addWall(-17,2.5,7,6,5,0.5,0x556644); addWall(-17,2.5,-7,6,5,0.5,0x556644);

// Right wing
addWall(14,2.5,0,0.5,5,14,0x443355); addWall(20,2.5,0,0.5,5,14,0x443355);
addWall(17,2.5,7,6,5,0.5,0x443355); addWall(17,2.5,-7,6,5,0.5,0x443355);

// South room
addWall(0,2.5,18,20,5,0.5,0x885533); addWall(0,2.5,28,20,5,0.5,0x885533);
addWall(-10,2.5,23,0.5,5,10,0x774422); addWall(10,2.5,23,0.5,5,10,0x774422);

// Cover objects
[[-5,1,22],[-8,1,-8],[8,1,-8],[-15,1,15],[15,1,15],[0,1,-30],[-25,1,-10],[25,1,-10],[5,1,22],[0,1,25]].forEach(
  ([x,y,z],i)=>addWall(x,y,z, i<5?2:3, 2, i>=8?3:2, [0x5C4A2A,0x4A6A4A,0x6A4A4A,0x4A5A6A,0x4A5A6A,0x6A6A4A,0x5A4A6A,0x5A4A6A,0x5C4A2A,0x5C4A2A][i])
);

// Lamps
function addLamp(x,z) {
  const l = new THREE.PointLight(0xffe0a0,1.2,15);
  l.position.set(x,4.5,z); scene.add(l);
  const b = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshBasicMaterial({color:0xffffaa}));
  b.position.set(x,4.5,z); scene.add(b);
}
[[0,0],[15,0],[-15,0],[0,-20],[0,22],[-17,0],[17,0]].forEach(([x,z])=>addLamp(x,z));

// Weapon
const weaponGroup = new THREE.Group();
const gunBody = new THREE.Mesh(new THREE.BoxGeometry(0.08,0.08,0.4), new THREE.MeshLambertMaterial({color:0x222222}));
gunBody.position.set(0,0,-0.2); weaponGroup.add(gunBody);
const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.018,0.018,0.35,8), new THREE.MeshLambertMaterial({color:0x111111}));
barrel.rotation.x=Math.PI/2; barrel.position.set(0,0.02,-0.38); weaponGroup.add(barrel);
const handle = new THREE.Mesh(new THREE.BoxGeometry(0.06,0.12,0.06), new THREE.MeshLambertMaterial({color:0x3a2a1a}));
handle.position.set(0,-0.09,-0.1); weaponGroup.add(handle);
weaponGroup.position.set(0.22,-0.18,-0.4);
camera.add(weaponGroup); scene.add(camera);

// State
let myId=null, myHealth=4, ammo=30, isReloading=false, isDead=false;
const keys={};
let yVel=0, onGround=true, pitch=0, yaw=0;
const SPEED=7, JUMP=8, GRAVITY=20, BOUND=34;
const bullets=[], impacts=[];
let pointerLocked=false;

// Input
document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()]=true;
  if(e.key.toLowerCase()==='r' && !isReloading && ammo<30) startReload();
  if(e.code==='Space' && onGround) { yVel=JUMP; onGround=false; }
});
document.addEventListener('keyup', e => keys[e.key.toLowerCase()]=false);

canvas.addEventListener('click', ()=>{ if(!pointerLocked) canvas.requestPointerLock(); });
document.addEventListener('pointerlockchange', ()=>{ pointerLocked=document.pointerLockElement===canvas; });
document.addEventListener('mousemove', e => {
  if(!pointerLocked||isDead) return;
  yaw -= e.movementX*0.002;
  pitch -= e.movementY*0.002;
  pitch = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, pitch));
});
document.addEventListener('mousedown', e=>{ if(e.button===0&&pointerLocked&&!isDead) shoot(); });

// HUD
function updateAmmoHUD() { document.getElementById('ammo').innerHTML=`${ammo} <span>/ ∞</span>`; }
function updateHealthHUD() { for(let i=1;i<=4;i++) document.getElementById('h'+i).classList.toggle('empty',i>myHealth); }
function addKillMsg(t) {
  const f=document.getElementById('kill-feed');
  const d=document.createElement('div'); d.className='kill-msg'; d.textContent=t;
  f.appendChild(d); setTimeout(()=>d.remove(),3200);
}
function flashHit() {
  const f=document.getElementById('hit-flash');
  f.style.background='rgba(255,0,0,0.35)';
  setTimeout(()=>f.style.background='rgba(255,0,0,0)',120);
}
function showMuzzleFlash() { const m=document.getElementById('muzzle-flash'); m.style.display='block'; setTimeout(()=>m.style.display='none',60); }
function showHitMarker() { const h=document.getElementById('hit-marker'); h.style.display='block'; setTimeout(()=>h.style.display='none',300); }

// Reload
function startReload() {
  isReloading=true;
  const bar=document.getElementById('reload-bar');
  const fill=document.getElementById('reload-fill');
  const txt=document.getElementById('reloading-text');
  bar.style.display='block'; txt.style.display='block';
  fill.style.transition='none'; fill.style.width='0%';
  setTimeout(()=>{ fill.style.transition='width 1.5s linear'; fill.style.width='100%'; },20);
  setTimeout(()=>{ ammo=30; isReloading=false; bar.style.display='none'; txt.style.display='none'; fill.style.width='0%'; updateAmmoHUD(); },1500);
}

// Collision
const pBox=new THREE.Box3(), pSize=new THREE.Vector3(0.6,1.8,0.6);
function checkCollision(pos) {
  pBox.setFromCenterAndSize(new THREE.Vector3(pos.x,pos.y-0.9,pos.z),pSize);
  return walls.some(w=>pBox.intersectsBox(w.box));
}

// Impact
function spawnImpact(pos,normal) {
  const imp=new THREE.Mesh(new THREE.CircleGeometry(0.08,8), new THREE.MeshBasicMaterial({color:0x111111,transparent:true,opacity:0.85,depthWrite:false}));
  imp.position.copy(pos).addScaledVector(normal,0.01);
  imp.lookAt(pos.clone().add(normal));
  scene.add(imp);
  impacts.push({mesh:imp,vel:new THREE.Vector3(),life:8});
  for(let i=0;i<6;i++) {
    const sp=new THREE.Mesh(new THREE.SphereGeometry(0.025,4,4),new THREE.MeshBasicMaterial({color:0xffaa00}));
    sp.position.copy(pos); scene.add(sp);
    impacts.push({mesh:sp,vel:new THREE.Vector3((Math.random()-0.5)*4,Math.random()*3,(Math.random()-0.5)*4),life:0.5});
  }
}

// Remote players
const remotePlayers={};
function createRemotePlayer(id) {
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.BoxGeometry(0.6,1.2,0.4),new THREE.MeshLambertMaterial({color:0xe74c3c}));
  body.position.y=0.6; g.add(body);
  const head=new THREE.Mesh(new THREE.BoxGeometry(0.4,0.4,0.4),new THREE.MeshLambertMaterial({color:0xf4a460}));
  head.position.y=1.5; g.add(head);
  const legL=new THREE.Mesh(new THREE.BoxGeometry(0.22,0.7,0.3),new THREE.MeshLambertMaterial({color:0x2c3e50}));
  legL.position.set(-0.15,-0.1,0); g.add(legL);
  const legR=new THREE.Mesh(new THREE.BoxGeometry(0.22,0.7,0.3),new THREE.MeshLambertMaterial({color:0x2c3e50}));
  legR.position.set(0.15,-0.1,0); g.add(legR);
  const gun=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.06,0.3),new THREE.MeshLambertMaterial({color:0x111111}));
  gun.position.set(0.35,0.7,-0.15); g.add(gun);
  const hbBg=new THREE.Mesh(new THREE.PlaneGeometry(0.8,0.08),new THREE.MeshBasicMaterial({color:0x333333,depthTest:false}));
  hbBg.position.y=2.1; g.add(hbBg);
  const hbFill=new THREE.Mesh(new THREE.PlaneGeometry(0.8,0.08),new THREE.MeshBasicMaterial({color:0x2ecc71,depthTest:false}));
  hbFill.position.set(0,2.1,0.001); g.add(hbFill);
  g.castShadow=true; scene.add(g);
  remotePlayers[id]={group:g,body,hbBg,hbFill,health:4,alive:true};
  return remotePlayers[id];
}

function updateRemoteHealth(id,h) {
  const p=remotePlayers[id]; if(!p) return;
  p.health=h;
  const s=Math.max(0,h/4);
  p.hbFill.scale.x=s; p.hbFill.position.x=(s-1)*0.4;
  p.hbFill.material.color.set(h<=2?0xe74c3c:0x2ecc71);
}

function removeRemotePlayer(id) {
  const p=remotePlayers[id]; if(p){scene.remove(p.group);delete remotePlayers[id];}
}

// Shoot
function shoot() {
  if(isReloading||ammo<=0) { if(ammo<=0) startReload(); return; }
  ammo--; updateAmmoHUD(); showMuzzleFlash();
  weaponGroup.position.z+=0.06; setTimeout(()=>weaponGroup.position.z-=0.06,80);

  const dir=new THREE.Vector3(0,0,-1).applyEuler(new THREE.Euler(pitch,yaw,0,'YXZ'));
  const origin=camera.position.clone().add(new THREE.Vector3(0,-0.05,0));

  const bMesh=new THREE.Mesh(new THREE.SphereGeometry(0.04,6,6),new THREE.MeshBasicMaterial({color:0xffee00}));
  bMesh.position.copy(origin); scene.add(bMesh);
  bullets.push({mesh:bMesh,pos:origin.clone(),dir:dir.clone(),speed:60,life:1.5});

  const ray=new THREE.Raycaster(origin,dir.clone().normalize(),0,100);
  const wallHits=ray.intersectObjects(walls.map(w=>w.mesh));
  if(wallHits.length>0) {
    const h=wallHits[0];
    setTimeout(()=>spawnImpact(h.point, h.face?h.face.normal:new THREE.Vector3(0,1,0)),30);
  }

  for(const [pid,pObj] of Object.entries(remotePlayers)) {
    if(!pObj.alive) continue;
    const hits=ray.intersectObject(pObj.group,true);
    if(hits.length>0) {
      if(ws&&ws.readyState===1) ws.send(JSON.stringify({type:'hit',targetId:pid}));
      showHitMarker(); break;
    }
  }

  if(ws&&ws.readyState===1)
    ws.send(JSON.stringify({type:'shoot',origin:{x:origin.x,y:origin.y,z:origin.z},direction:{x:dir.x,y:dir.y,z:dir.z}}));
}

// WebSocket
let ws=null;
document.getElementById('connect-btn').addEventListener('click',()=>{
  connectToServer(document.getElementById('server-ip').value.trim());
});

function connectToServer(url) {
  try { ws=new WebSocket(url); } catch(e){ alert('URL invalide: '+url); return; }
  ws.onopen=()=>{ document.getElementById('connect-screen').style.display='none'; canvas.requestPointerLock(); };
  ws.onclose=()=>{ document.getElementById('connect-screen').style.display='flex'; for(const id in remotePlayers) removeRemotePlayer(id); };
  ws.onerror=()=>alert('Impossible de se connecter.\nVérifiez que server.js tourne et que l\'IP est correcte.');
  ws.onmessage=(event)=>{
    const msg=JSON.parse(event.data);
    if(msg.type==='init') {
      myId=msg.id;
      camera.position.set(msg.spawn.x,msg.spawn.y,msg.spawn.z);
      yaw=0; pitch=0;
      for(const p of msg.players) {
        const rp=createRemotePlayer(p.id);
        rp.group.position.set(p.x,p.y-1.7,p.z);
        rp.group.rotation.y=p.rotY;
        if(!p.alive) rp.group.visible=false;
        updateRemoteHealth(p.id,p.health);
      }
      document.getElementById('info').textContent=`Joueur #${myId}`;
    }
    if(msg.type==='playerJoin') {
      createRemotePlayer(msg.player.id);
      remotePlayers[msg.player.id].group.position.set(msg.player.x,msg.player.y-1.7,msg.player.z);
      addKillMsg(`Joueur #${msg.player.id} a rejoint la partie`);
    }
    if(msg.type==='playerLeave') { removeRemotePlayer(msg.id); addKillMsg(`Joueur #${msg.id} a quitté`); }
    if(msg.type==='playerMove') {
      const rp=remotePlayers[msg.id];
      if(rp) { rp.group.position.set(msg.x,msg.y-1.7,msg.z); rp.group.rotation.y=msg.rotY; }
    }
    if(msg.type==='shoot') {
      const origin=new THREE.Vector3(msg.origin.x,msg.origin.y,msg.origin.z);
      const dir=new THREE.Vector3(msg.direction.x,msg.direction.y,msg.direction.z);
      const bm=new THREE.Mesh(new THREE.SphereGeometry(0.04,6,6),new THREE.MeshBasicMaterial({color:0xffee00}));
      bm.position.copy(origin); scene.add(bm);
      bullets.push({mesh:bm,pos:origin.clone(),dir:dir.clone(),speed:60,life:0.8});
      const ray=new THREE.Raycaster(origin,dir.clone().normalize(),0,100);
      const hits=ray.intersectObjects(walls.map(w=>w.mesh));
      if(hits.length>0) spawnImpact(hits[0].point,hits[0].face?hits[0].face.normal:new THREE.Vector3(0,1,0));
    }
    if(msg.type==='playerHit') {
      if(msg.targetId===myId) { myHealth=msg.health; updateHealthHUD(); flashHit(); }
      updateRemoteHealth(msg.targetId,msg.health);
    }
    if(msg.type==='playerDied') {
      if(msg.targetId===myId) { isDead=true; document.getElementById('death-screen').style.display='flex'; document.exitPointerLock(); }
      else { const rp=remotePlayers[msg.targetId]; if(rp) rp.group.visible=false; }
      addKillMsg(`Joueur #${msg.killerId} a tué Joueur #${msg.targetId} 💀`);
    }
    if(msg.type==='playerRespawn') {
      if(msg.id===myId) {
        myHealth=4; isDead=false; updateHealthHUD();
        camera.position.set(msg.spawn.x,msg.spawn.y,msg.spawn.z);
        yaw=0; pitch=0;
        document.getElementById('death-screen').style.display='none';
        canvas.requestPointerLock();
      } else {
        const rp=remotePlayers[msg.id];
        if(rp) { rp.group.visible=true; rp.group.position.set(msg.spawn.x,msg.spawn.y-1.7,msg.spawn.z); updateRemoteHealth(msg.id,4); }
      }
    }
  };
}

// Game loop
let lastTime=performance.now(), sendTimer=0;
function animate() {
  requestAnimationFrame(animate);
  const now=performance.now();
  const dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now;

  if(!isDead) {
    const md=new THREE.Vector3();
    if(keys['z']) md.z-=1;
    if(keys['s']) md.z+=1;
    if(keys['q']) md.x-=1;
    if(keys['d']) md.x+=1;
    md.normalize().multiplyScalar(SPEED*dt).applyEuler(new THREE.Euler(0,yaw,0));

    yVel -= GRAVITY*dt;
    const np=camera.position.clone();
    np.x+=md.x; if(checkCollision(np)) np.x=camera.position.x;
    np.z+=md.z; if(checkCollision(np)) np.z=camera.position.z;
    np.y+=yVel*dt;
    if(np.y<1.7){np.y=1.7;yVel=0;onGround=true;}else{onGround=false;}
    np.x=Math.max(-BOUND,Math.min(BOUND,np.x));
    np.z=Math.max(-BOUND,Math.min(BOUND,np.z));
    camera.position.copy(np);
    camera.rotation.order='YXZ';
    camera.rotation.y=yaw; camera.rotation.x=pitch;

    sendTimer+=dt;
    if(ws&&ws.readyState===1&&sendTimer>0.05) {
      sendTimer=0;
      ws.send(JSON.stringify({type:'move',x:camera.position.x,y:camera.position.y,z:camera.position.z,rotY:yaw}));
    }
  }

  // Bullets
  for(let i=bullets.length-1;i>=0;i--) {
    const b=bullets[i]; b.life-=dt;
    if(b.life<=0){scene.remove(b.mesh);bullets.splice(i,1);continue;}
    b.pos.add(b.dir.clone().multiplyScalar(b.speed*dt));
    b.mesh.position.copy(b.pos);
  }

  // Impacts/sparks
  for(let i=impacts.length-1;i>=0;i--) {
    const imp=impacts[i]; imp.life-=dt;
    if(imp.life<=0){scene.remove(imp.mesh);impacts.splice(i,1);continue;}
    imp.mesh.position.add(imp.vel.clone().multiplyScalar(dt));
    imp.vel.y-=15*dt;
    if(imp.mesh.material.opacity!==undefined) imp.mesh.material.opacity=Math.min(1,imp.life*2);
  }

  // Billboard health bars
  for(const pid in remotePlayers) {
    const rp=remotePlayers[pid];
    if(rp&&rp.alive&&rp.hbBg) {
      rp.hbBg.lookAt(camera.position);
      rp.hbFill.lookAt(camera.position);
    }
  }

  renderer.render(scene,camera);
}
animate();
</script>
